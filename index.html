<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MomBase">
<meta name="theme-color" content="#9b3d12">
<title>MomBase</title>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:'Lato',sans-serif;background:#f9f4fb;color:#2a1008;}
  #app{display:flex;height:100vh;overflow:hidden;}
  /* Scrollbar */
  ::-webkit-scrollbar{width:5px;}
  ::-webkit-scrollbar-track{background:#f9f4fb;}
  ::-webkit-scrollbar-thumb{background:#d3969f;border-radius:3px;}
  /* Sidebar */
  #sidebar{background:#9b3d12;flex-shrink:0;display:flex;flex-direction:column;transition:width .22s ease;overflow:hidden;box-shadow:4px 0 20px rgba(155,61,18,.18);}
  #sidebar.open{width:230px;}
  #sidebar.closed{width:60px;}
  .sidebar-header{padding:20px 14px 14px;border-bottom:1px solid #7a2f0d;display:flex;align-items:center;gap:10px;min-height:72px;}
  .sidebar-brand{flex:1;min-width:0;}
  .sidebar-brand h1{color:#ede6f2;font-family:'Abril Fatface',serif;font-size:19px;letter-spacing:.5px;white-space:nowrap;}
  .sidebar-brand p{color:#d3969faa;font-size:11px;margin-top:2px;white-space:nowrap;}
  .toggle-btn{background:none;border:none;color:#d3969faa;cursor:pointer;font-size:16px;padding:4px;flex-shrink:0;line-height:1;}
  nav{flex:1;padding-top:8px;overflow-y:auto;}
  .nav-item{display:flex;align-items:center;gap:12px;padding:11px 18px;cursor:pointer;transition:background .15s;border-left:3px solid transparent;}
  .nav-item:hover{background:#7a2f0d44;}
  .nav-item.active{background:#7a2f0d;border-left-color:#d3969f;}
  .nav-icon{font-size:18px;flex-shrink:0;min-width:24px;text-align:center;}
  .nav-label{color:#e8d0c8;font-size:14px;white-space:nowrap;overflow:hidden;}
  .nav-item.active .nav-label{color:#fff;font-weight:700;}
  .sidebar-footer{padding:10px 14px 18px;color:#c4856a;font-size:11px;text-align:center;border-top:1px solid #7a2f0d;}
  /* Main */
  #main{flex:1;overflow-y:auto;padding:28px 24px 60px;}
  /* Cards */
  .card{background:#fff;border:1px solid #e2d0dc;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(155,61,18,.06);}
  /* Section title */
  .sec-title{font-family:'Abril Fatface',serif;color:#9b3d12;font-size:26px;margin-bottom:20px;letter-spacing:.5px;}
  /* Buttons */
  .btn{border:none;border-radius:10px;cursor:pointer;font-family:'Lato',sans-serif;font-weight:700;font-size:14px;padding:11px 22px;transition:all .15s;}
  .btn-sm{padding:6px 14px;font-size:12px;}
  .btn-primary{background:#9b3d12;color:#fff;}
  .btn-primary:hover{background:#7a2f0d;}
  .btn-red{background:#ba3222;color:#fff;}
  .btn-soft{background:#ede6f2;color:#9b3d12;}
  .btn-ghost{background:transparent;color:#7a5c58;border:1px solid #e2d0dc;}
  .btn-danger{background:#ba3222;color:#fff;}
  /* Inputs */
  .inp{width:100%;padding:10px 14px;border:1.5px solid #e2d0dc;border-radius:10px;font-family:'Lato',sans-serif;font-size:14px;background:#ede6f280;color:#2a1008;outline:none;box-sizing:border-box;}
  .inp:focus{border-color:#9b3d12;}
  textarea.inp{resize:vertical;min-height:80px;}
  select.inp{appearance:none;}
  /* Pill tabs */
  .pill{display:inline-block;padding:5px 14px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:700;background:#ede6f2;color:#9b3d12;transition:all .15s;}
  .pill.active{background:#9b3d12;color:#fff;}
  /* Modal overlay */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(42,16,8,.5);z-index:1000;align-items:center;justify-content:center;padding:16px;}
  .modal-overlay.show{display:flex;}
  .modal-box{background:#fff;border-radius:20px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 16px 60px rgba(155,61,18,.25);}
  .modal-box.wide{max-width:640px;}
  .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .modal-title{font-family:'Abril Fatface',serif;color:#9b3d12;font-size:20px;}
  .modal-close{background:none;border:none;font-size:26px;cursor:pointer;color:#7a5c58;line-height:1;}
  /* Form */
  .form-col{display:flex;flex-direction:column;gap:12px;}
  /* Toggle */
  .toggle{width:52px;height:28px;border-radius:14px;cursor:pointer;position:relative;transition:background .2s;flex-shrink:0;}
  .toggle-knob{position:absolute;top:4px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.2);}
  /* Tag badge */
  .tag{background:#ede6f2;color:#9b3d12;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;display:inline-block;}
  /* Grid helpers */
  .grid-auto{display:grid;gap:14px;}
  /* Stats row */
  .stat-card{text-align:center;padding:16px 10px;border:none !important;}
  .stat-num{font-family:'Abril Fatface',serif;font-size:28px;color:#9b3d12;}
  .stat-label{font-size:11px;color:#7a5c58;margin-top:2px;}
  /* Calendar */
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
  .cal-day-header{text-align:center;font-size:11px;font-weight:700;color:#7a5c58;padding:4px 0;}
  .cal-cell{min-height:62px;border-radius:8px;padding:4px 5px;cursor:pointer;border:1px solid #e2d0dc;transition:all .1s;}
  .cal-cell:hover{background:#ede6f2;}
  .cal-cell.today{background:#d3969f40;border:2px solid #d3969f;}
  .cal-cell.selected{background:#ede6f2;border:2px solid #9b3d12;}
  .cal-cell-num{font-size:12px;font-weight:500;color:#2a1008;margin-bottom:2px;}
  .cal-cell.today .cal-cell-num{font-family:'Abril Fatface',serif;color:#ba3222;font-weight:700;}
  .cal-evt{font-size:9px;color:#fff;border-radius:3px;padding:1px 4px;margin-bottom:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;}
  /* Note card */
  .note-card{border-radius:14px;padding:14px;border:1px solid #e2d0dc;display:flex;flex-direction:column;gap:8px;}
  /* Alarm card */
  .alarm-time{font-family:'Abril Fatface',serif;font-size:34px;letter-spacing:1px;}
  /* Day pill */
  .day-pill{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;display:inline-block;}
  /* Notification banner */
  .banner{padding:12px 16px;border-radius:12px;display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px;}
  /* Color dot */
  .color-dot{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border .1s;}
  .color-dot.selected{border-color:#333;box-shadow:0 0 0 2px #fff inset;}
  /* Responsive */
  #hamburger{display:none !important;}
  @media(max-width:700px){
    /* On mobile, sidebar starts closed */
    #sidebar{position:fixed;top:0;left:0;height:100vh;z-index:200;}
    #sidebar.open{width:220px;}
    #sidebar.closed{width:0px;overflow:hidden;}
    #main{padding:60px 12px 100px;margin-left:0 !important;}
    .modal-box{padding:18px;border-radius:14px;}
    .modal-box.wide{max-width:100%;}
    .sec-title{font-size:22px;}
    .card{padding:14px;}
    .btn{padding:9px 16px;font-size:13px;}
    .btn-sm{padding:5px 11px;font-size:11px;}
  }
  /* Bottom nav for mobile */
  #bottom-nav{display:none;}
  @media(max-width:700px){
    #bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:#9b3d12;z-index:300;border-top:2px solid #7a2f0d;padding:6px 0 10px;}
    #bottom-nav .bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 2px;}
    #bottom-nav .bn-item .bn-icon{font-size:20px;line-height:1;}
    #bottom-nav .bn-item .bn-label{font-size:9px;color:#e8d0c8;font-family:'Lato',sans-serif;font-weight:700;}
    #bottom-nav .bn-item.active .bn-label{color:#fff;}
    #bottom-nav .bn-item.active .bn-icon{transform:scale(1.15);}
    #hamburger{display:flex !important;}
    #bottom-nav{padding-bottom:env(safe-area-inset-bottom,10px);}
  }
  /* File upload area */
  .upload-area{border:2px dashed #d3969f;border-radius:12px;padding:24px;text-align:center;cursor:pointer;background:#ede6f280;transition:background .15s;}
  .upload-area:hover{background:#ede6f2;}
  /* Section divider label */
  .sec-label{font-size:11px;font-weight:700;color:#7a5c58;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
  /* Bill row */
  .bill-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;}
</style>
</head>
<body>
<div id="app">
<!-- Mobile hamburger -->
<button id="hamburger" onclick="toggleSidebar()" id="hamburger" style="position:fixed;top:12px;left:12px;z-index:400;background:#9b3d12;border:none;border-radius:10px;width:42px;height:42px;cursor:pointer;font-size:20px;color:#fff;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.3);">&#9776;</button>
<!-- Mobile overlay -->
<div id="mob-overlay" onclick="if(window.innerWidth<=700){sidebarOpen=false;applySidebar();}" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:199;"></div>
<!-- Bottom nav (mobile) -->
<div id="bottom-nav"></div>
  <div id="sidebar" class="open">
    <div class="sidebar-header">
      <div class="sidebar-brand">
        <h1>MomBase</h1>
        <p>your life, organized &#128144;</p>
      </div>
      <button class="toggle-btn" onclick="toggleSidebar()">◄</button>
    </div>
    <nav id="nav"></nav>
    <div class="sidebar-footer" id="sf">You are doing great today &#128155;</div>
  </div>
  <div id="main"></div>
</div>

<!-- Modals -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalIfBg(event)">
  <div class="modal-box" id="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">&#215;</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ─── Data ───────────────────────────────────────────────────────────────────
const STORE_KEY = 'mombase_v4';
const DEFAULT = {
  events:[
    {id:1,title:'School pickup',date:'2026-03-10',time:'15:00',endTime:'',color:'#9b3d12',desc:'',location:'',repeat:'none'},
    {id:2,title:'Grocery run',date:'2026-03-12',time:'10:00',endTime:'',color:'#ba3222',desc:'',location:'',repeat:'none'},
  ],
  alarms:[
    {id:1,label:'Take medication',time:'08:00',days:['Mon','Tue','Wed','Thu','Fri'],active:true,sound:'chime1'},
    {id:2,label:'Start dinner prep',time:'17:00',days:['Mon','Tue','Wed','Thu','Fri'],active:true,sound:'chime3'},
  ],
  notes:[
    {id:1,title:'School supply list',content:'Glue sticks, markers, composition notebook, scissors',color:'#fff8e1',pinned:true,date:'2026-02-28',folder:'School',photos:[],links:[]},
    {id:2,title:'Self-care reminder',content:'You are doing amazing. Rest is productive.',color:'#fce4ec',pinned:true,date:'2026-03-01',folder:'Personal',photos:[],links:[]},
  ],
  noteFolders:['Personal','School','Household','Health'],
  recipes:[
    {id:1,title:'One-Pot Pasta',ingredients:'Pasta\nCanned tomatoes\nGarlic\nBasil\nOlive oil',steps:'1. Boil pasta.\n2. Saute garlic in oil.\n3. Add tomatoes, simmer 10 min.\n4. Toss with pasta and basil.',tags:['easy','dinner'],time:'20 min',link:''},
    {id:2,title:'Sheet Pan Chicken',ingredients:'Chicken thighs\nPotatoes\nBroccoli\nOlive oil\nItalian herbs',steps:'1. Preheat oven to 425F.\n2. Toss everything in oil and seasoning.\n3. Roast 35 minutes.',tags:['dinner','meal prep'],time:'40 min',link:''},
  ],
  files:[
    {id:1,name:'Insurance card',type:'file',date:'2026-01-15',tag:'Health',dataUrl:null},
  ],
  locations:[
    {id:1,name:'Pediatrician',address:'123 Maple St',phone:'555-0101',notes:'Dr. Kim - 2nd floor',category:'Health'},
    {id:2,name:'Best Grocery Store',address:'456 Oak Ave',phone:'',notes:'Best produce, side parking',category:'Shopping'},
  ],
  bills:[
    {id:1,name:'Electric Bill',amount:120,due:15,paid:false,auto:false,category:'Utilities'},
    {id:2,name:'Internet',amount:65,due:1,paid:true,auto:true,category:'Utilities'},
    {id:3,name:'Mortgage',amount:1450,due:1,paid:true,auto:true,category:'Housing'},
    {id:4,name:'Car Insurance',amount:180,due:22,paid:false,auto:false,category:'Insurance'},
  ],
};

let DB = (() => { try { const s=localStorage.getItem(STORE_KEY); return s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT)); } catch(e){ return JSON.parse(JSON.stringify(DEFAULT)); } })();
function save(){ try{ localStorage.setItem(STORE_KEY,JSON.stringify(DB)); }catch(e){} }
function set(key,val){ DB[key]=val; save(); render(); }

// ─── Alarm Ticker ─────────────────────────────────────────────────────────
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const firedAlarms = new Set();
setInterval(()=>{
  const now=new Date();
  const hhmm=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const day=DAYS[now.getDay()];
  DB.alarms.forEach(a=>{
    if(!a.active||!a.days.includes(day)||a.time!==hhmm) return;
    const key=`${a.id}-${now.toDateString()}-${hhmm}`;
    if(firedAlarms.has(key)) return;
    firedAlarms.add(key);
    playChime(a.sound||'chime1');
    if(Notification.permission==='granted') new Notification('MomBase Reminder',{body:a.label,icon:''});
  });
}, 10000);

// ─── Audio ────────────────────────────────────────────────────────────────
function playChime(id){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const seqs={
      chime1:[[523,0],[659,.2],[784,.4],[1047,.6]],
      chime2:[[392,0],[523,.15],[659,.3],[784,.45],[1047,.6]],
      chime3:[[880,0],[988,.1],[1047,.2],[880,.4],[784,.55]],
      chime4:[[1047,0]],
      chime5:[[528,0],[528,.25],[792,.45]],
    };
    (seqs[id]||seqs.chime1).forEach(([freq,t])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type='sine'; o.frequency.value=freq;
      g.gain.setValueAtTime(.4,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.8);
      o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+.9);
    });
  }catch(e){}
}

// ─── UI Helpers ───────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const h = (tag,attrs={},inner='') => {
  const el=document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{ if(k==='style')Object.assign(el.style,v); else if(k.startsWith('on'))el[k]=v; else el.setAttribute(k,v); });
  if(typeof inner==='string') el.innerHTML=inner; else if(Array.isArray(inner)) inner.forEach(c=>c&&el.appendChild(typeof c==='string'?Object.assign(document.createTextNode(''),{data:c}):c)); else if(inner) el.appendChild(inner);
  return el;
};

function el(tag,props={},children=[]){
  const e=document.createElement(tag);
  Object.entries(props).forEach(([k,v])=>{
    if(k==='class')e.className=v;
    else if(k==='style')Object.assign(e.style,v);
    else if(k.startsWith('on')&&typeof v==='function')e[k]=v;
    else e.setAttribute(k,v);
  });
  children.flat().forEach(c=>{
    if(c===null||c===undefined) return;
    e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);
  });
  return e;
}

function btn(label,cls,onclick,attrs={}){
  const b=document.createElement('button');
  b.className='btn '+(cls||'btn-primary');
  b.innerHTML=label; b.onclick=onclick;
  Object.entries(attrs).forEach(([k,v])=>b.setAttribute(k,v));
  return b;
}
function inp(placeholder,value,oninput,type='text',attrs={}){
  const i=document.createElement('input');
  i.className='inp'; i.type=type; i.placeholder=placeholder; i.value=value||'';
  i.oninput=e=>oninput(e.target.value);
  Object.entries(attrs).forEach(([k,v])=>i.setAttribute(k,v));
  return i;
}
function ta(placeholder,value,oninput){
  const t=document.createElement('textarea');
  t.className='inp'; t.placeholder=placeholder; t.value=value||'';
  t.oninput=e=>oninput(e.target.value);
  return t;
}
function sel(options,value,onchange){
  const s=document.createElement('select');
  s.className='inp';
  options.forEach(([v,l])=>{
    const o=document.createElement('option');
    o.value=v; o.textContent=l||v; if(v===value)o.selected=true;
    s.appendChild(o);
  });
  s.onchange=e=>onchange(e.target.value);
  return s;
}
function col(...children){
  const d=document.createElement('div');
  d.className='form-col';
  children.flat().forEach(c=>c&&d.appendChild(c));
  return d;
}
function row(...children){
  const d=document.createElement('div');
  d.style.cssText='display:flex;gap:8px;flex-wrap:wrap;align-items:center;';
  children.flat().forEach(c=>c&&d.appendChild(c));
  return d;
}
function card(children,style={}){
  const d=document.createElement('div');
  d.className='card';
  Object.assign(d.style,style);
  if(Array.isArray(children)) children.flat().forEach(c=>c&&d.appendChild(typeof c==='string'?Object.assign(document.createElement('span'),{innerHTML:c}):c));
  else if(children) d.appendChild(typeof children==='string'?Object.assign(document.createElement('span'),{innerHTML:children}):children);
  return d;
}
function tag(text){ const s=document.createElement('span'); s.className='tag'; s.textContent=text; return s; }
function lbl(text,style={}){ const d=document.createElement('div'); d.style.cssText='font-size:12px;color:#7a5c58;margin-bottom:4px;'; Object.assign(d.style,style); d.textContent=text; return d; }
function secLabel(text){ const d=document.createElement('div'); d.className='sec-label'; d.textContent=text; return d; }
function pill(text,active,onclick){ const d=document.createElement('div'); d.className='pill'+(active?' active':''); d.textContent=text; d.onclick=onclick; return d; }
function grid(cols,children,gap='12px'){
  const d=document.createElement('div');
  d.style.cssText=`display:grid;grid-template-columns:repeat(auto-fill,minmax(${cols},1fr));gap:${gap};`;
  children.flat().forEach(c=>c&&d.appendChild(c));
  return d;
}
function toggle(on,onToggle){
  const d=document.createElement('div');
  d.className='toggle';
  d.style.background=on?'#9b3d12':'#e2d0dc';
  d.innerHTML=`<div class="toggle-knob" style="left:${on?'28':'4'}px"></div>`;
  d.onclick=onToggle;
  return d;
}

// ─── Modal ────────────────────────────────────────────────────────────────
function openModal(title,bodyEl,wide=false){
  $('modal-title').textContent=title;
  $('modal-body').innerHTML='';
  $('modal-body').appendChild(bodyEl);
  $('modal-box').className='modal-box'+(wide?' wide':'');
  $('modal-overlay').classList.add('show');
}
function closeModal(){ $('modal-overlay').classList.remove('show'); }
function closeModalIfBg(e){ if(e.target===$('modal-overlay')) closeModal(); }

// ─── Navigation ───────────────────────────────────────────────────────────
const SECTIONS = [
  ['Dashboard','&#127968;'],['Calendar','&#128197;'],['Alarms','&#9200;'],
  ['Notes','&#128221;'],['Recipes','&#127859;'],['Files','&#128193;'],
  ['Locations','&#128205;'],['Bills','&#128184;'],
];
let activeSection = 'Dashboard';
let sidebarOpen = false; // always start closed, open on desktop after load

function buildNav(){
  const nav=$('nav'); nav.innerHTML='';
  SECTIONS.forEach(([name,icon])=>{
    const d=document.createElement('div');
    d.className='nav-item'+(activeSection===name?' active':'');
    d.innerHTML=`<span class="nav-icon">${icon}</span><span class="nav-label">${name}</span>`;
    d.onclick=()=>{ activeSection=name; buildNav(); renderSection(); if(window.innerWidth<600){sidebarOpen=false;applySidebar();} };
    nav.appendChild(d);
  });
}
function toggleSidebar(){
  sidebarOpen=!sidebarOpen; applySidebar();
}
function applySidebar(){
  const sb=$('sidebar');
  const mobile=window.innerWidth<=700;
  sb.className=sidebarOpen?'open':'closed';
  const sf=$('sf'); if(sf) sf.style.display=sidebarOpen?'':'none';
  const tb=sb.querySelector('.toggle-btn'); if(tb) tb.innerHTML=sidebarOpen?'◄':'►';
  const brand=sb.querySelector('.sidebar-brand'); if(brand) brand.style.display=sidebarOpen?'':'none';
  const overlay=$('mob-overlay');
  if(overlay) overlay.style.display=(mobile&&sidebarOpen)?'block':'none';
}

// ─── Render ───────────────────────────────────────────────────────────────
function render(){ buildNav(); buildBottomNav(); renderSection(); }
function buildBottomNav(){
  const bn=$('bottom-nav'); if(!bn) return;
  bn.innerHTML='';
  // Show 5 most important sections in bottom nav
  [['Dashboard','&#127968;'],['Calendar','&#128197;'],['Notes','&#128221;'],['Alarms','&#9200;'],['Bills','&#128184;']].forEach(([name,icon])=>{
    const item=document.createElement('div');
    item.className='bn-item'+(activeSection===name?' active':'');
    item.innerHTML=`<div class="bn-icon">${icon}</div><div class="bn-label">${name}</div>`;
    item.onclick=()=>{ activeSection=name; if(sidebarOpen&&window.innerWidth<=700){sidebarOpen=false;applySidebar();} render(); };
    bn.appendChild(item);
  });
  // More button
  const more=document.createElement('div');
  more.className='bn-item';
  more.innerHTML='<div class="bn-icon">&#8942;</div><div class="bn-label">More</div>';
  more.onclick=()=>{ sidebarOpen=!sidebarOpen; applySidebar(); };
  bn.appendChild(more);
}
window.addEventListener('resize',()=>{ if(window.innerWidth>700&&!sidebarOpen){sidebarOpen=true;applySidebar();} });
function renderSection(){
  const main=$('main'); main.innerHTML='';
  switch(activeSection){
    case 'Dashboard': main.appendChild(renderDashboard()); break;
    case 'Calendar':  main.appendChild(renderCalendar()); break;
    case 'Alarms':    main.appendChild(renderAlarms()); break;
    case 'Notes':     main.appendChild(renderNotes()); break;
    case 'Recipes':   main.appendChild(renderRecipes()); break;
    case 'Files':     main.appendChild(renderFiles()); break;
    case 'Locations': main.appendChild(renderLocations()); break;
    case 'Bills':     main.appendChild(renderBills()); break;
  }
}

// ─── Dashboard ────────────────────────────────────────────────────────────
function renderDashboard(){
  const today=new Date();
  const ts=today.toISOString().slice(0,10);
  const dw=DAYS[today.getDay()];
  const h=today.getHours();
  const greeting=(h<12?'Good morning':h<17?'Good afternoon':'Good evening');
  const te=DB.events.filter(e=>e.date===ts);
  const ub=DB.bills.filter(b=>!b.paid);
  const aa=DB.alarms.filter(a=>a.active&&a.days.includes(dw));
  const pn=DB.notes.filter(n=>n.pinned);

  const wrap=document.createElement('div');

  // Header
  const hdr=document.createElement('div');
  hdr.style.marginBottom='28px';
  hdr.innerHTML=`<h1 style="font-family:'Abril Fatface',serif;color:#9b3d12;font-size:34px;">${greeting} &#127800;</h1>
    <p style="color:#7a5c58;font-size:15px;margin-top:6px;">${today.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</p>`;
  wrap.appendChild(hdr);

  // Stats
  const stats=document.createElement('div');
  stats.style.cssText='display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:24px;';
  [
    ['&#128197;',te.length,"Today's Events",'#9b3d1218'],
    ['&#128184;',ub.length,'Unpaid Bills','#ba322218'],
    ['&#9200;',aa.length,'Alarms Today','#d3969f30'],
    ['&#128204;',pn.length,'Pinned Notes','#c8895a20'],
  ].forEach(([icon,num,label,bg])=>{
    const c=document.createElement('div');
    c.className='card stat-card';
    c.style.background=bg;
    c.style.border='none';
    c.innerHTML=`<div style="font-size:24px;">${icon}</div><div class="stat-num">${num}</div><div class="stat-label">${label}</div>`;
    stats.appendChild(c);
  });
  wrap.appendChild(stats);

  // Detail cards
  const detGrid=document.createElement('div');
  detGrid.style.cssText='display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;';

  // Today schedule
  const sc=card('');
  sc.innerHTML=`<div style="font-family:'Abril Fatface',serif;color:#9b3d12;margin-bottom:10px;font-size:16px;">&#128197; Today's Schedule</div>`;
  if(te.length){
    te.forEach(e=>{
      const r=document.createElement('div');
      r.style.cssText='display:flex;gap:10px;align-items:center;margin-bottom:8px;';
      r.innerHTML=`<div style="width:10px;height:10px;border-radius:50%;background:${e.color};flex-shrink:0;"></div><b style="font-size:14px;">${e.time}</b><span style="font-size:14px;color:#7a5c58;">${e.title}</span>`;
      sc.appendChild(r);
    });
  } else { sc.innerHTML+=`<p style="color:#7a5c58;font-size:13px;font-style:italic;">Free day - enjoy it!</p>`; }

  // Alarms today
  const ac=card('');
  ac.innerHTML=`<div style="font-family:'Abril Fatface',serif;color:#9b3d12;margin-bottom:10px;font-size:16px;">&#9200; Alarms Today</div>`;
  if(aa.length){
    aa.forEach(a=>{
      const r=document.createElement('div');
      r.style.cssText='display:flex;justify-content:space-between;margin-bottom:8px;';
      r.innerHTML=`<span style="font-size:14px;">${a.label}</span><b style="font-size:14px;color:#ba3222;">${a.time}</b>`;
      ac.appendChild(r);
    });
  } else { ac.innerHTML+=`<p style="color:#7a5c58;font-size:13px;font-style:italic;">No alarms today</p>`; }

  // Bills
  const bc=card('');
  bc.innerHTML=`<div style="font-family:'Abril Fatface',serif;color:#9b3d12;margin-bottom:10px;font-size:16px;">&#128184; Bills to Pay</div>`;
  if(ub.length){
    ub.slice(0,4).forEach(b=>{
      const r=document.createElement('div');
      r.style.cssText='display:flex;justify-content:space-between;margin-bottom:8px;';
      r.innerHTML=`<span style="font-size:14px;">${b.name}</span><b style="font-size:14px;color:#ba3222;">$${b.amount} - Day ${b.due}</b>`;
      bc.appendChild(r);
    });
  } else { bc.innerHTML+=`<p style="color:#7a5c58;font-size:13px;font-style:italic;">All bills paid!</p>`; }

  // Pinned notes
  const nc=card('');
  nc.innerHTML=`<div style="font-family:'Abril Fatface',serif;color:#9b3d12;margin-bottom:10px;font-size:16px;">&#128204; Pinned Notes</div>`;
  if(pn.length){
    pn.slice(0,3).forEach(n=>{
      const r=document.createElement('div');
      r.style.cssText=`background:${n.color};border-radius:10px;padding:8px 12px;margin-bottom:8px;overflow:hidden;`;
      r.innerHTML=`<b style="font-size:13px;display:block;">${n.title}</b><span style="font-size:12px;color:#7a5c58;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;">${n.content}</span>`;

    });

  [sc,ac,bc,nc].forEach(c=>detGrid.appendChild(c));
  wrap.appendChild(detGrid);
  return wrap;
}

// ─── Calendar ─────────────────────────────────────────────────────────────
let calState={yr:new Date().getFullYear(),mo:new Date().getMonth(),view:'month',selDay:null};
let calForm={title:'',date:'',time:'',endTime:'',color:'#9b3d12',desc:'',location:'',repeat:'none'};
let editEvtId=null;

function renderCalendar(){
  const wrap=document.createElement('div');
  const today=new Date();
  const ts=today.toISOString().slice(0,10);

  // Header
  const hdr=document.createElement('div');
  hdr.style.cssText='display:flex;flex-wrap:wrap;gap:10px;justify-content:space-between;align-items:center;margin-bottom:18px;';
  const title=document.createElement('h2'); title.className='sec-title'; title.style.margin='0'; title.textContent='Calendar';
  const controls=document.createElement('div'); controls.style.cssText='display:flex;gap:8px;flex-wrap:wrap;';
  ['month','week','list'].forEach(v=>{
    controls.appendChild(pill(v.charAt(0).toUpperCase()+v.slice(1),calState.view===v,()=>{ calState.view=v; calState.selDay=null; renderSection(); }));
  });
  controls.appendChild(btn('+ Event','btn btn-primary btn-sm',()=>openEvtModal()));
  hdr.appendChild(title); hdr.appendChild(controls);
  wrap.appendChild(hdr);

  // Connect calendars
  const connect=document.createElement('div');
  connect.className='card';
  connect.style.cssText='margin-bottom:14px;background:#ede6f2;border:1px dashed #d3969f;padding:12px 16px;';
  connect.innerHTML=`<div style="font-family:'Abril Fatface',serif;color:#9b3d12;font-size:14px;margin-bottom:8px;">&#128279; Connect Your Calendars</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <a href="https://calendar.google.com" target="_blank" style="padding:6px 14px;border-radius:20px;background:#4285F4;color:#fff;font-size:12px;font-weight:700;text-decoration:none;">Google Calendar</a>
      <a href="https://outlook.live.com/calendar" target="_blank" style="padding:6px 14px;border-radius:20px;background:#0078D4;color:#fff;font-size:12px;font-weight:700;text-decoration:none;">Outlook</a>
      <a href="https://www.icloud.com/calendar" target="_blank" style="padding:6px 14px;border-radius:20px;background:#444;color:#fff;font-size:12px;font-weight:700;text-decoration:none;">Apple Calendar</a>
    </div>`;
  wrap.appendChild(connect);

  // Nav
  const nav=document.createElement('div');
  nav.style.cssText='display:flex;align-items:center;gap:12px;margin-bottom:16px;';
  const prev=btn('&#8249;','btn btn-soft btn-sm',()=>{ if(calState.mo===0){calState.mo=11;calState.yr--;}else calState.mo--; renderSection(); });
  const next2=btn('&#8250;','btn btn-soft btn-sm',()=>{ if(calState.mo===11){calState.mo=0;calState.yr++;}else calState.mo++; renderSection(); });
  const mTitle=document.createElement('h3');
  mTitle.style.cssText="font-family:'Abril Fatface',serif;color:#2a1008;min-width:190px;text-align:center;";
  mTitle.textContent=`${MONTHS[calState.mo]} ${calState.yr}`;
  const todayBtn=btn('Today','btn btn-ghost btn-sm',()=>{ calState.yr=today.getFullYear(); calState.mo=today.getMonth(); renderSection(); });
  nav.appendChild(prev); nav.appendChild(mTitle); nav.appendChild(next2); nav.appendChild(todayBtn);
  wrap.appendChild(nav);

  const dayEvents=ds=>DB.events.filter(e=>e.date===ds);

  if(calState.view==='month'){
    const calCard=document.createElement('div'); calCard.className='card'; calCard.style.marginBottom='16px';
    const hRow=document.createElement('div'); hRow.className='cal-grid'; hRow.style.marginBottom='4px';
    DAYS.forEach(d=>{ const dh=document.createElement('div'); dh.className='cal-day-header'; dh.textContent=d; hRow.appendChild(dh); });
    calCard.appendChild(hRow);

    const fd=new Date(calState.yr,calState.mo,1).getDay();
    const dim=new Date(calState.yr,calState.mo+1,0).getDate();
    const grid2=document.createElement('div'); grid2.className='cal-grid';

    for(let i=0;i<fd;i++){ const empty=document.createElement('div'); grid2.appendChild(empty); }
    for(let d=1;d<=dim;d++){
      const ds=`${calState.yr}-${String(calState.mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const evs=dayEvents(ds);
      const cell=document.createElement('div');
      cell.className='cal-cell'+(ds===ts?' today':'')+(calState.selDay===d?' selected':'');
      cell.onclick=()=>{ calState.selDay=calState.selDay===d?null:d; renderSection(); };
      const num=document.createElement('div'); num.className='cal-cell-num'; num.textContent=d;
      cell.appendChild(num);
      evs.slice(0,2).forEach(e=>{
        const eb=document.createElement('div');
        eb.className='cal-evt'; eb.style.background=e.color; eb.textContent=e.title;
        eb.onclick=ev=>{ ev.stopPropagation(); openEvtModal(e); };
        cell.appendChild(eb);
      });
      if(evs.length>2){ const more=document.createElement('div'); more.style.cssText='font-size:9px;color:#7a5c58;'; more.textContent=`+${evs.length-2}`; cell.appendChild(more); }
      grid2.appendChild(cell);
    }
    calCard.appendChild(grid2);
    wrap.appendChild(calCard);

    // Selected day
    if(calState.selDay){
      const ds=`${calState.yr}-${String(calState.mo+1).padStart(2,'0')}-${String(calState.selDay).padStart(2,'0')}`;
      const selCard=document.createElement('div'); selCard.className='card'; selCard.style.borderLeft='4px solid #9b3d12';
      const sh=document.createElement('div'); sh.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;';
      const st2=document.createElement('b'); st2.style.fontFamily="'Abril Fatface',serif"; st2.style.color='#9b3d12';
      st2.textContent=`${MONTHS[calState.mo]} ${calState.selDay}, ${calState.yr}`;
      const addBtn=btn('+ Add Event','btn btn-primary btn-sm',()=>openEvtModal(null,ds));
      sh.appendChild(st2); sh.appendChild(addBtn); selCard.appendChild(sh);
      const evs=dayEvents(ds);
      if(!evs.length){ const p2=document.createElement('p'); p2.style.cssText='color:#7a5c58;font-size:13px;font-style:italic;'; p2.textContent='No events. Click + Add Event.'; selCard.appendChild(p2); }
      evs.forEach(e=>{
        const er=document.createElement('div'); er.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #e2d0dc;';
        const el2=document.createElement('div'); el2.style.cssText='display:flex;gap:10px;align-items:center;';
        const dot=document.createElement('div'); dot.style.cssText=`width:10px;height:10px;border-radius:50%;background:${e.color};flex-shrink:0;`;
        const info=document.createElement('div');
        info.innerHTML=`<b style="font-size:14px;">${e.title}</b>${e.time?`<span style="font-size:12px;color:#7a5c58;margin-left:8px;">${e.time}${e.endTime?' - '+e.endTime:''}</span>`:''}${e.location?`<div style="font-size:12px;color:#7a5c58;">&#128205; ${e.location}</div>`:''}`;
        el2.appendChild(dot); el2.appendChild(info); er.appendChild(el2);
        const btns=row(btn('Edit','btn btn-soft btn-sm',()=>openEvtModal(e)),btn('X','btn btn-danger btn-sm',()=>{ DB.events=DB.events.filter(x=>x.id!==e.id); save(); renderSection(); }));
        er.appendChild(btns); selCard.appendChild(er);
      });
      wrap.appendChild(selCard);
    }
  }

  if(calState.view==='list'){
    const sorted=[...DB.events].sort((a,b)=>a.date.localeCompare(b.date));
    if(!sorted.length){ wrap.appendChild(Object.assign(document.createElement('p'),{textContent:'No events yet.',style:{color:'#7a5c58',fontStyle:'italic'}})); }
    sorted.forEach(e=>{
      const c=document.createElement('div'); c.className='card'; c.style.cssText='display:flex;justify-content:space-between;align-items:center;padding:12px 16px;margin-bottom:8px;';
      const left=document.createElement('div'); left.style.cssText='display:flex;gap:12px;align-items:center;';
      const dot=document.createElement('div'); dot.style.cssText=`width:12px;height:12px;border-radius:50%;background:${e.color};flex-shrink:0;`;
      const info=document.createElement('div'); info.innerHTML=`<b>${e.title}</b><div style="font-size:12px;color:#7a5c58;">${e.date}${e.time?' - '+e.time:''}${e.location?' | '+e.location:''}</div>`;
      left.appendChild(dot); left.appendChild(info); c.appendChild(left);
      c.appendChild(row(btn('Edit','btn btn-soft btn-sm',()=>openEvtModal(e)),btn('X','btn btn-danger btn-sm',()=>{ DB.events=DB.events.filter(x=>x.id!==e.id); save(); renderSection(); })));
      wrap.appendChild(c);
    });
  }

  if(calState.view==='week'){
    const wCard=document.createElement('div'); wCard.className='card'; wCard.style.overflowX='auto';
    const tbl=document.createElement('div'); tbl.style.cssText='display:grid;grid-template-columns:60px repeat(7,1fr);gap:2px;min-width:560px;';
    const startD=new Date(calState.yr,calState.mo,1);
    startD.setDate(startD.getDate()-startD.getDay());
    const corner=document.createElement('div');
    tbl.appendChild(corner);
    for(let i=0;i<7;i++){
      const d=new Date(startD); d.setDate(d.getDate()+i);
      const ds=d.toISOString().slice(0,10);
      const dh=document.createElement('div'); dh.style.cssText=`text-align:center;padding:6px 2px;border-radius:8px;background:${ds===ts?'#d3969f40':'transparent'};`;
      dh.innerHTML=`<div style="font-size:11px;color:#7a5c58;">${DAYS[i]}</div><div style="font-size:15px;font-weight:700;color:${ds===ts?'#9b3d12':'#2a1008'};">${d.getDate()}</div>`;
      tbl.appendChild(dh);
    }
    for(let hour=6;hour<22;hour++){
      const lbl2=document.createElement('div'); lbl2.style.cssText='font-size:10px;color:#7a5c58;text-align:right;padding:2px 6px;border-top:1px solid #e2d0dc;';
      lbl2.textContent=`${String(hour).padStart(2,'0')}:00`; tbl.appendChild(lbl2);
      for(let di=0;di<7;di++){
        const d=new Date(startD); d.setDate(d.getDate()+di);
        const ds=d.toISOString().slice(0,10);
        const cell=document.createElement('div'); cell.style.cssText='border-top:1px solid #e2d0dc;min-height:36px;padding:2px;';
        DB.events.filter(e=>e.date===ds&&e.time&&parseInt(e.time.split(':')[0])===hour).forEach(e=>{
          const eb=document.createElement('div'); eb.style.cssText=`background:${e.color};color:#fff;border-radius:3px;padding:1px 4px;font-size:9px;cursor:pointer;margin-bottom:1px;`;
          eb.textContent=e.title; eb.onclick=()=>openEvtModal(e); cell.appendChild(eb);
        });
        tbl.appendChild(cell);
      }
    }
    wCard.appendChild(tbl); wrap.appendChild(wCard);
  }

  return wrap;
}

function openEvtModal(evt=null,preDate=''){
  editEvtId=evt?evt.id:null;
  calForm=evt?{...evt}:{title:'',date:preDate||'',time:'',endTime:'',color:'#9b3d12',desc:'',location:'',repeat:'none'};
  rebuildEvtModal();
}

function rebuildEvtModal(){
  const f=calForm;
  const colorRow=document.createElement('div');
  colorRow.style.cssText='display:flex;gap:8px;align-items:center;flex-wrap:wrap;';
  const clbl=document.createElement('span'); clbl.style.cssText='font-size:13px;color:#7a5c58;'; clbl.textContent='Color:';
  colorRow.appendChild(clbl);
  ['#9b3d12','#ba3222','#d3969f','#6b8e4e','#2980b9','#8e44ad'].forEach(c=>{
    const dot=document.createElement('div'); dot.className='color-dot'+(f.color===c?' selected':'');
    dot.style.background=c;
    dot.onclick=()=>{ calForm.color=c; rebuildEvtModal(); };
    colorRow.appendChild(dot);
  });

  const body=col(
    inp('Event title *',f.title,v=>calForm.title=v),
    (() => { const g=document.createElement('div'); g.style.cssText='display:grid;grid-template-columns:1fr 1fr;gap:10px;'; [
      [lbl('Date *'),inp('',f.date,v=>calForm.date=v,'date')],
      [lbl('Start time'),inp('',f.time,v=>calForm.time=v,'time')],
      [lbl('End time'),inp('',f.endTime,v=>calForm.endTime=v,'time')],
      [lbl('Repeat'),sel([['none','None'],['daily','Daily'],['weekly','Weekly'],['monthly','Monthly'],['yearly','Yearly']],f.repeat,v=>calForm.repeat=v)],
    ].forEach(([l,i])=>{ const w=document.createElement('div'); w.appendChild(l); w.appendChild(i); g.appendChild(w); }); return g; })(),
    inp('Location (optional)',f.location,v=>calForm.location=v),
    ta('Description',f.desc,v=>calForm.desc=v),
    colorRow,
    (() => {
      const r=document.createElement('div'); r.style.cssText='display:flex;gap:8px;justify-content:flex-end;';
      if(editEvtId) r.appendChild(btn('Delete','btn btn-danger',()=>{ DB.events=DB.events.filter(e=>e.id!==editEvtId); save(); closeModal(); renderSection(); }));
      r.appendChild(btn('Save Event','btn btn-primary',()=>{
        if(!calForm.title||!calForm.date) return;
        if(editEvtId) DB.events=DB.events.map(e=>e.id===editEvtId?{...calForm,id:editEvtId}:e);
        else DB.events.push({...calForm,id:Date.now()});
        save(); closeModal(); renderSection();
      }));
      return r;
    })()
  );
  openModal(editEvtId?'Edit Event':'New Event',body,true);
}

// ─── Alarms ───────────────────────────────────────────────────────────────
const SOUND_NAMES={chime1:'Gentle Chime',chime2:'Bell Tower',chime3:'Morning Bird',chime4:'Soft Ding',chime5:'Crystal Bowl'};

function renderAlarms(){
  const wrap=document.createElement('div');
  const hdr=document.createElement('div'); hdr.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;';
  const t=document.createElement('h2'); t.className='sec-title'; t.style.margin='0'; t.textContent='Alarms & Reminders';
  hdr.appendChild(t); hdr.appendChild(btn('+ New Alarm','btn btn-primary',()=>openAlarmModal())); wrap.appendChild(hdr);

  if(Notification.permission!=='granted'){
    const b=document.createElement('div'); b.className='banner'; b.style.cssText='background:#d3969f25;border:1px dashed #d3969f;margin-bottom:14px;border-radius:12px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;';
    b.innerHTML='<span style="font-size:13px;color:#9b3d12;">Enable notifications so alarms can alert you even away from the screen</span>';
    b.appendChild(btn('Enable','btn btn-primary btn-sm',async()=>{ await Notification.requestPermission(); renderSection(); }));
    wrap.appendChild(b);
  }

  const list=document.createElement('div'); list.style.cssText='display:flex;flex-direction:column;gap:12px;';
  DB.alarms.forEach(a=>{
    const c=document.createElement('div'); c.className='card'; c.style.cssText=`display:flex;justify-content:space-between;align-items:center;opacity:${a.active?1:.55};border-left:4px solid ${a.active?'#9b3d12':'#e2d0dc'};`;
    const left=document.createElement('div');
    const timeDiv=document.createElement('div'); timeDiv.className='alarm-time'; timeDiv.style.color=a.active?'#9b3d12':'#7a5c58'; timeDiv.textContent=a.time;
    const nameDiv=document.createElement('b'); nameDiv.style.cssText='display:block;margin-bottom:4px;'; nameDiv.textContent=a.label;
    const soundDiv=document.createElement('div'); soundDiv.style.cssText='font-size:11px;color:#7a5c58;margin-bottom:8px;'; soundDiv.textContent=SOUND_NAMES[a.sound]||'Gentle Chime';
    const daysRow=document.createElement('div'); daysRow.style.cssText='display:flex;gap:4px;flex-wrap:wrap;';
    DAYS.forEach(d=>{ const dp=document.createElement('span'); dp.className='day-pill'; dp.style.background=a.days.includes(d)?'#9b3d12':'#ede6f2'; dp.style.color=a.days.includes(d)?'#fff':'#7a5c58'; dp.textContent=d; daysRow.appendChild(dp); });
    left.appendChild(timeDiv); left.appendChild(nameDiv); left.appendChild(soundDiv); left.appendChild(daysRow);
    const right=document.createElement('div'); right.style.cssText='display:flex;gap:10px;align-items:center;';
    right.appendChild(btn('Test','btn btn-ghost btn-sm',()=>playChime(a.sound)));
    right.appendChild(toggle(a.active,()=>{ a.active=!a.active; save(); renderSection(); }));
    right.appendChild(btn('X','btn btn-danger btn-sm',()=>{ DB.alarms=DB.alarms.filter(x=>x.id!==a.id); save(); renderSection(); }));
    c.appendChild(left); c.appendChild(right); list.appendChild(c);
  });
  wrap.appendChild(list);
  return wrap;
}

function openAlarmModal(){
  let fm={label:'',time:'08:00',days:[],sound:'chime1'};
  function rebuild(){
    const daysRow=document.createElement('div'); daysRow.style.cssText='display:flex;gap:6px;flex-wrap:wrap;';
    DAYS.forEach(d=>{ const dp=document.createElement('div'); dp.className='pill'+(fm.days.includes(d)?' active':''); dp.textContent=d; dp.style.padding='6px 12px'; dp.onclick=()=>{ fm.days=fm.days.includes(d)?fm.days.filter(x=>x!==d):[...fm.days,d]; rebuild(); }; daysRow.appendChild(dp); });

let noteFilter='All';

function renderNotes(){
  const wrap=document.createElement('div');
  const hdr=document.createElement('div'); hdr.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;';
  const t=document.createElement('h2'); t.className='sec-title'; t.style.margin='0'; t.textContent='Notes';
  const btns2=row(btn('Folders','btn btn-soft btn-sm',()=>openFolderModal()),btn('+ Note','btn btn-primary btn-sm',()=>openNoteModal()));
  hdr.appendChild(t); hdr.appendChild(btns2); wrap.appendChild(hdr);

  const si=inp('Search notes...',noteSearch,v=>{ noteSearch=v; renderSection(); }); si.style.marginBottom='12px'; wrap.appendChild(si);

  // Folder pills
  const fp=document.createElement('div'); fp.style.cssText='display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px;';
  ['All',...(DB.noteFolders||[])].forEach(f=>{ fp.appendChild(pill(f,noteFilter===f,()=>{ noteFilter=f; renderSection(); })); });
  wrap.appendChild(fp);

  const filtered=DB.notes.filter(n=>{
    const ms=n.title.toLowerCase().includes(noteSearch.toLowerCase())||n.content.toLowerCase().includes(noteSearch.toLowerCase());
    const mf=noteFilter==='All'||n.folder===noteFilter;
    return ms&&mf;

function renderNoteGrid(notes){

function renderNoteCard(note){

  const actions=document.createElement('div'); actions.style.cssText='display:flex;gap:4px;flex-shrink:0;';
  if(note.folder){ const fb=document.createElement('span'); fb.style.cssText='font-size:10px;background:rgba(0,0,0,.08);border-radius:10px;padding:2px 6px;'; fb.textContent=note.folder; actions.appendChild(fb); }
  const pinBtn=document.createElement('button'); pinBtn.style.cssText='background:none;border:none;cursor:pointer;font-size:14px;'; pinBtn.textContent=note.pinned?'*':'o';

  // Content (editable)

  // Photos

    const pr=document.createElement('div'); pr.style.cssText='display:flex;gap:6px;flex-wrap:wrap;';

      xb.textContent='x'; xb.onclick=()=>{ note.photos.splice(i,1); save(); renderSection(); };
      pw.appendChild(img); pw.appendChild(xb); pr.appendChild(pw);
    });
    c.appendChild(pr);
  }

  // Links
  if((note.links||[]).length){
    const lr=document.createElement('div'); lr.style.cssText='display:flex;flex-direction:column;gap:4px;';
    note.links.forEach((lk,i)=>{
      const lrow=document.createElement('div'); lrow.style.cssText='display:flex;align-items:center;gap:6px;';
      const a=document.createElement('a'); a.href=lk.startsWith('http')?lk:'https://'+lk; a.target='_blank';
      a.style.cssText='font-size:12px;color:#ba3222;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;'; a.textContent=lk;
      const xb=document.createElement('button'); xb.style.cssText='background:none;border:none;cursor:pointer;color:#7a5c58;font-size:12px;'; xb.textContent='x';
      xb.onclick=()=>{ note.links.splice(i,1); save(); renderSection(); };
      lrow.appendChild(a); lrow.appendChild(xb); lr.appendChild(lrow);
    });
    c.appendChild(lr);
  }

  // Action bar
  const bar=document.createElement('div'); bar.style.cssText='display:flex;gap:6px;border-top:1px solid rgba(0,0,0,.06);padding-top:8px;flex-wrap:wrap;';

  const addPhotoBtn=document.createElement('button'); addPhotoBtn.style.cssText='background:rgba(255,255,255,.6);border:1px solid #e2d0dc;border-radius:6px;padding:3px 8px;cursor:pointer;font-size:11px;color:#7a5c58;'; addPhotoBtn.textContent='+ Photo';
  const photoInput=document.createElement('input'); photoInput.type='file'; photoInput.accept='image/*'; photoInput.style.display='none';
  photoInput.onchange=e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader(); reader.onload=ev=>{ if(!note.photos)note.photos=[]; note.photos.push(ev.target.result); save(); renderSection(); }; reader.readAsDataURL(file);
  };
  addPhotoBtn.onclick=()=>photoInput.click();

  const addLinkBtn=document.createElement('button'); addLinkBtn.style.cssText='background:rgba(255,255,255,.6);border:1px solid #e2d0dc;border-radius:6px;padding:3px 8px;cursor:pointer;font-size:11px;color:#7a5c58;'; addLinkBtn.textContent='+ Link';
  let linkRowShown=false;

  const li2=document.createElement('input'); li2.type='url'; li2.placeholder='https://...'; li2.className='inp'; li2.style.flex='1'; li2.style.padding='6px 10px'; li2.style.fontSize='12px';

  const dateLbl=document.createElement('div'); dateLbl.style.cssText='font-size:10px;color:#7a5c58;'; dateLbl.textContent=note.date||'';
  c.appendChild(dateLbl);

  let fm={name:'',type:'file',tag:'',dataUrl:null};
  function rebuild(){
    const uploadArea=document.createElement('div'); uploadArea.className='upload-area';
    if(fm.dataUrl&&fm.type==='photo'){
      const img=document.createElement('img'); img.src=fm.dataUrl; img.style.cssText='max-width:100%;max-height:150px;border-radius:8px;object-fit:cover;'; uploadArea.appendChild(img);
    } else if(fm.dataUrl){
      uploadArea.innerHTML=`<div style="font-size:13px;color:#9b3d12;">File ready: ${fm.name}</div>`;
    } else {
      uploadArea.innerHTML='<div style="font-size:34px;margin-bottom:8px;">&#128193;</div><div style="font-size:14px;color:#7a5c58;">Click to choose a file or photo</div>';
    }
    const fileInp=document.createElement('input'); fileInp.type='file'; fileInp.style.display='none';
    fileInp.onchange=e=>{ const f=e.target.files[0]; if(!f) return; fm.type=f.type.startsWith('image/')?'photo':'file'; fm.name=f.name; const r=new FileReader(); r.onload=ev=>{ fm.dataUrl=ev.target.result; rebuild(); }; r.readAsDataURL(f); };
    uploadArea.onclick=()=>fileInp.click();

    const typeRow=document.createElement('div'); typeRow.style.cssText='display:flex;gap:8px;';
    ['file','photo'].forEach(t=>{ const d=document.createElement('div'); d.style.cssText=`flex:1;padding:10px;border-radius:10px;cursor:pointer;text-align:center;font-weight:700;background:${fm.type===t?'#9b3d12':'#ede6f2'};color:${fm.type===t?'#fff':'#7a5c58'};`; d.textContent=t==='file'?'File':'Photo'; d.onclick=()=>{ fm.type=t; rebuild(); }; typeRow.appendChild(d); });

    const body=col(
      uploadArea, fileInp,
      inp('Name / Description',fm.name,v=>fm.name=v),
      typeRow,
      inp('Tag (Health, School, Insurance...)',fm.tag,v=>fm.tag=v),
      btn('Add Item','btn btn-primary',()=>{ if(!fm.name) return; DB.files.push({...fm,id:Date.now(),date:new Date().toISOString().slice(0,10)}); save(); closeModal(); renderSection(); })
    );
    openModal('Add File or Photo',body);
  }
  rebuild();
}

// ─── Locations ────────────────────────────────────────────────────────────
const CAT_COLORS={Health:'#fdecea',Shopping:'#e8f5e9',Fun:'#e3f2fd',School:'#fffde7',Other:'#f3e5f5'};

function renderLocations(){
  const wrap=document.createElement('div');
  const hdr=document.createElement('div'); hdr.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;';
  const t=document.createElement('h2'); t.className='sec-title'; t.style.margin='0'; t.textContent='Saved Locations';
  hdr.appendChild(t); hdr.appendChild(btn('+ Add Location','btn btn-primary',()=>openLocationModal())); wrap.appendChild(hdr);
  const cats=[...new Set(DB.locations.map(l=>l.category))];
  cats.forEach(cat=>{
    const sec=document.createElement('div'); sec.style.marginBottom='24px';
    sec.appendChild(secLabel(cat));
    const g=document.createElement('div'); g.style.cssText='display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;margin-top:8px;';
    DB.locations.filter(l=>l.category===cat).forEach(l=>{
      const c=document.createElement('div'); c.className='card'; c.style.background=CAT_COLORS[cat]||'#f9f4fb';
      const hr=document.createElement('div'); hr.style.cssText='display:flex;justify-content:space-between;margin-bottom:8px;';
      const nm=document.createElement('b'); nm.textContent=l.name; hr.appendChild(nm);
      hr.appendChild(btn('X','btn btn-ghost btn-sm',()=>{ DB.locations=DB.locations.filter(x=>x.id!==l.id); save(); renderSection(); }));
      c.appendChild(hr);
      if(l.address){ const d=document.createElement('div'); d.style.cssText='font-size:13px;color:#7a5c58;margin-bottom:3px;'; d.textContent='Address: '+l.address; c.appendChild(d); }
      if(l.phone){ const d=document.createElement('div'); d.style.cssText='font-size:13px;color:#7a5c58;margin-bottom:3px;'; d.textContent='Phone: '+l.phone; c.appendChild(d); }
      if(l.notes){ const d=document.createElement('div'); d.style.cssText='font-size:13px;font-style:italic;margin-top:6px;'; d.textContent='"'+l.notes+'"'; c.appendChild(d); }
      if(l.address){ const a=document.createElement('a'); a.href='https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(l.address); a.target='_blank'; a.style.cssText='font-size:12px;color:#9b3d12;font-weight:700;text-decoration:none;display:block;margin-top:10px;'; a.textContent='Open in Maps'; c.appendChild(a); }
      g.appendChild(c);
    });
    sec.appendChild(g); wrap.appendChild(sec);
  });
  return wrap;
}

function openLocationModal(){
  let fm={name:'',address:'',phone:'',notes:'',category:'Other'};
  const body=col(
    inp('Place name',fm.name,v=>fm.name=v),
    inp('Address',fm.address,v=>fm.address=v),
    inp('Phone (optional)',fm.phone,v=>fm.phone=v),
    ta('Notes (hours, parking, tips...)',fm.notes,v=>fm.notes=v),
    sel([['Health','Health'],['Shopping','Shopping'],['Fun','Fun'],['School','School'],['Other','Other']],fm.category,v=>fm.category=v),
    btn('Save Location','btn btn-primary',()=>{ if(!fm.name) return; DB.locations.push({...fm,id:Date.now()}); save(); closeModal(); renderSection(); })
  );
  openModal('Save a Location',body);
}

// ─── Bills ────────────────────────────────────────────────────────────────
function renderBills(){
  const wrap=document.createElement('div');
  const hdr=document.createElement('div'); hdr.style.cssText='display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;';
  const t=document.createElement('h2'); t.className='sec-title'; t.style.margin='0'; t.textContent='Bills & Budget';
  hdr.appendChild(t); hdr.appendChild(btn('+ Add Bill','btn btn-primary',()=>openBillModal())); wrap.appendChild(hdr);

  const total=DB.bills.reduce((s,b)=>s+b.amount,0);
  const paid=DB.bills.filter(b=>b.paid).reduce((s,b)=>s+b.amount,0);
  const statsRow=document.createElement('div'); statsRow.style.cssText='display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px;';
  [['$'+total.toFixed(2),'Monthly Total','#e8f5e9','#2e7d32'],['$'+paid.toFixed(2),'Paid','#e3f2fd','#1565c0'],['$'+(total-paid).toFixed(2),'Remaining','#fdecea','#ba3222']].forEach(([v,l,bg,col2])=>{
    const c=document.createElement('div'); c.className='card stat-card'; c.style.background=bg; c.style.border='none';
    c.innerHTML=`<div style="font-size:20px;font-weight:700;font-family:'Abril Fatface',serif;color:${col2};">${v}</div><div style="font-size:12px;color:#7a5c58;">${l}</div>`;
    statsRow.appendChild(c);
  });
  wrap.appendChild(statsRow);

  const list=document.createElement('div'); list.style.cssText='display:flex;flex-direction:column;gap:8px;';
  [...DB.bills].sort((a,b)=>a.due-b.due).forEach(b=>{
    const c=document.createElement('div'); c.className='card bill-row'; c.style.cssText=`opacity:${b.paid?.65:1};border-left:4px solid ${b.paid?'#ba3222':'#9b3d12'};`;
    const left=document.createElement('div');
    const nm=document.createElement('div'); nm.style.cssText=`font-weight:700;text-decoration:${b.paid?'line-through':'none'};`; nm.textContent=b.name;
    const info=document.createElement('div'); info.style.cssText='font-size:12px;color:#7a5c58;'; info.textContent=`Due day ${b.due} - ${b.category}${b.auto?' - Auto-pay':''}`;
    left.appendChild(nm); left.appendChild(info);
    const right=document.createElement('div'); right.style.cssText='display:flex;gap:8px;align-items:center;';
    const am=document.createElement('b'); am.style.cssText="font-size:16px;font-family:'Abril Fatface',serif;"; am.textContent='$'+b.amount; right.appendChild(am);
    right.appendChild(btn(b.paid?'Undo':'Paid',b.paid?'btn btn-ghost btn-sm':'btn btn-red btn-sm',()=>{ b.paid=!b.paid; save(); renderSection(); }));
    right.appendChild(btn('X','btn btn-danger btn-sm',()=>{ DB.bills=DB.bills.filter(x=>x.id!==b.id); save(); renderSection(); }));
    c.appendChild(left); c.appendChild(right); list.appendChild(c);
  });
  wrap.appendChild(list);
  return wrap;
}

function openBillModal(){
  let fm={name:'',amount:'',due:'',auto:false,category:'Utilities'};
  const body=col(
    inp('Bill name',fm.name,v=>fm.name=v),
    inp('Amount ($)',fm.amount,v=>fm.amount=v,'number'),
    inp('Due on day of month (e.g. 15)',fm.due,v=>fm.due=v,'number'),
    sel([['Utilities','Utilities'],['Housing','Housing'],['Insurance','Insurance'],['Subscriptions','Subscriptions'],['Food','Food'],['Other','Other']],fm.category,v=>fm.category=v),
    (() => { const l=document.createElement('label'); l.style.cssText='display:flex;gap:8px;align-items:center;cursor:pointer;font-size:14px;'; const cb=document.createElement('input'); cb.type='checkbox'; cb.onchange=e=>fm.auto=e.target.checked; l.appendChild(cb); l.appendChild(document.createTextNode('Auto-pay enabled')); return l; })(),
    btn('Add Bill','btn btn-primary',()=>{ if(!fm.name||!fm.amount) return; DB.bills.push({...fm,amount:parseFloat(fm.amount),due:parseInt(fm.due)||1,id:Date.now(),paid:false}); save(); closeModal(); renderSection(); })
  );
  openModal('Add a Bill',body);
}

// ─── Init ─────────────────────────────────────────────────────────────────
// Start with sidebar open on desktop, closed on mobile
sidebarOpen = window.innerWidth > 700;
render();
applySidebar();
</script>
